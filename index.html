<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战斗游戏·地狱版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(20, 0, 0, 0.8), rgba(0, 0, 10, 0.9)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a1a1a' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .font-display {
            font-family: 'Black Ops One', cursive;
        }

        /* 生命值条动画 */
        .health-fill {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 按钮点击动画 */
        .btn-attack:active {
            transform: translateY(2px) scale(0.98);
        }

        /* 屏幕震动效果 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-screen {
            animation: shake 0.5s;
        }

        /* 浮动伤害文字 */
        .floating-damage {
            position: absolute;
            font-weight: bold;
            font-size: 2rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px currentColor;
            z-index: 50;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }

        /* CRT 扫描线效果 */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #444; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #666; 
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4 relative crt">

    <!-- 粒子特效 Canvas -->
    <canvas id="particleCanvas" class="absolute top-0 left-0 w-full h-full pointer-events-none z-10"></canvas>

    <!-- 游戏主容器 -->
    <div id="game-container" class="w-full max-w-4xl z-20 flex flex-col gap-6">
        
        <!-- 标题 -->
        <header class="text-center mb-2">
            <h1 class="font-display text-5xl md:text-6xl text-transparent bg-clip-text bg-gradient-to-b from-red-500 to-red-900 drop-shadow-[0_0_10px_rgba(220,38,38,0.8)] tracking-wider">
                战斗游戏·地狱版
            </h1>
            <p class="text-gray-500 text-sm mt-2 tracking-[0.5em] uppercase">System: Online // Mode: Survival</p>
        </header>

        <!-- 战斗区域 -->
        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- 玩家 1 (左侧) -->
            <div class="glass-panel rounded-xl p-6 border-l-4 border-blue-500 relative overflow-hidden group transition-all hover:bg-opacity-80">
                <div class="absolute top-0 right-0 p-2 opacity-10 group-hover:opacity-20 transition-opacity">
                    <svg class="w-24 h-24 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                </div>
                
                <div class="flex justify-between items-end mb-2">
                    <h2 class="text-2xl font-bold text-blue-400">玩家 1</h2>
                    <span class="text-xs text-blue-300 font-mono">LV.99 HUMAN</span>
                </div>

                <!-- 血条 -->
                <div class="w-full bg-gray-800 h-6 rounded-full overflow-hidden border border-gray-700 relative mb-6">
                    <div id="player-hp-bar" class="health-fill bg-gradient-to-r from-blue-600 to-blue-400 h-full w-full relative">
                        <div class="absolute top-0 left-0 w-full h-full bg-[url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzhhYWGMYAEYB8RmROaABADeOQ8CXl/xfgAAAABJRU5ErkJggg==')] opacity-30"></div>
                    </div>
                    <span id="player-hp-text" class="absolute inset-0 flex items-center justify-center text-xs font-bold text-white drop-shadow-md">1000 / 1000</span>
                </div>

                <!-- 控制按钮 -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="playerAction('light')" class="btn-attack bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white py-3 px-4 rounded shadow-lg transition-all flex flex-col items-center group">
                        <span class="font-bold text-blue-200 group-hover:text-white">快速斩击</span>
                        <span class="text-[10px] text-gray-400">伤害 50-80</span>
                    </button>
                    
                    <button id="btn-heavy" onclick="playerAction('heavy')" class="btn-attack bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white py-3 px-4 rounded shadow-lg transition-all flex flex-col items-center group relative overflow-hidden disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="font-bold text-purple-200 group-hover:text-white">蓄力重击</span>
                        <span class="text-[10px] text-gray-400">伤害 120-180 (CD:5)</span>
                        <div id="cd-heavy" class="absolute inset-0 bg-black bg-opacity-80 flex items-center justify-center hidden">
                            <span class="text-red-500 font-mono font-bold text-xl"></span>
                        </div>
                    </button>

                    <button id="btn-heal" onclick="playerAction('heal')" class="btn-attack bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white py-3 px-4 rounded shadow-lg transition-all flex flex-col items-center group col-span-2 relative overflow-hidden disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="font-bold text-green-200 group-hover:text-white">纳米修复</span>
                        <span class="text-[10px] text-gray-400">恢复 100-150 HP (CD:3)</span>
                        <div id="cd-heal" class="absolute inset-0 bg-black bg-opacity-80 flex items-center justify-center hidden">
                            <span class="text-red-500 font-mono font-bold text-xl"></span>
                        </div>
                    </button>
                </div>
            </div>

            <!-- VS 标志 (仅桌面端显示) -->
            <div class="hidden md:flex absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 z-30 pointer-events-none">
                <div class="bg-black border-2 border-red-900 text-red-600 font-display text-2xl p-3 rounded-full shadow-[0_0_15px_rgba(220,38,38,0.6)] rotate-12">
                    VS
                </div>
            </div>

            <!-- 地狱 AI (右侧) -->
            <div class="glass-panel rounded-xl p-6 border-r-4 border-red-600 relative overflow-hidden group transition-all hover:bg-opacity-80">
                <div class="absolute top-0 left-0 p-2 opacity-10 group-hover:opacity-20 transition-opacity">
                    <svg class="w-24 h-24 text-red-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 9a1 1 0 100-2 1 1 0 000 2zm7-1a1 1 0 11-2 0 1 1 0 012 0zm-.464 5.535a1 1 0 10-1.415-1.414 3 3 0 01-4.242 0 1 1 0 00-1.415 1.414 5 5 0 007.072 0z" clip-rule="evenodd"></path></svg>
                </div>

                <div class="flex justify-between items-end mb-2 flex-row-reverse">
                    <h2 class="text-2xl font-bold text-red-500">地狱 AI</h2>
                    <span class="text-xs text-red-400 font-mono">LV.?? DEMON</span>
                </div>

                <!-- 血条 -->
                <div class="w-full bg-gray-800 h-6 rounded-full overflow-hidden border border-gray-700 relative mb-6">
                    <div id="ai-hp-bar" class="health-fill bg-gradient-to-l from-red-700 to-red-500 h-full w-full relative">
                         <div class="absolute top-0 left-0 w-full h-full bg-[url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzhhYWGMYAEYB8RmROaABADeOQ8CXl/xfgAAAABJRU5ErkJggg==')] opacity-30"></div>
                    </div>
                    <span id="ai-hp-text" class="absolute inset-0 flex items-center justify-center text-xs font-bold text-white drop-shadow-md">1200 / 1200</span>
                </div>

                <!-- AI 状态/意图 -->
                <div class="h-[116px] flex items-center justify-center border border-red-900/30 bg-red-900/10 rounded-lg">
                    <div id="ai-status" class="text-center">
                        <span class="block text-red-400 font-mono text-sm animate-pulse">等待指令输入...</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- 战斗记录 -->
        <section class="glass-panel rounded-xl p-4 h-48 flex flex-col">
            <h3 class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-2 border-b border-gray-700 pb-1">战斗记录 / BATTLE LOG</h3>
            <div id="battle-log" class="flex-1 overflow-y-auto font-mono text-sm space-y-2 pr-2">
                <div class="text-gray-500 italic">> 系统初始化完成...</div>
                <div class="text-gray-500 italic">> 对手已连接：地狱AI。</div>
                <div class="text-yellow-600 italic">> 战斗开始！</div>
            </div>
        </section>

    </div>

    <!-- 游戏结束遮罩 -->
    <div id="game-over-modal" class="fixed inset-0 z-50 bg-black bg-opacity-90 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="text-center p-8 border-2 border-gray-700 bg-gray-900 rounded-2xl max-w-md w-full shadow-[0_0_50px_rgba(0,0,0,1)]">
            <h2 id="end-title" class="font-display text-5xl mb-4 text-white">GAME OVER</h2>
            <p id="end-message" class="text-gray-300 mb-8 text-lg">你已被地狱吞噬。</p>
            <button onclick="resetGame()" class="bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 text-white font-bold py-3 px-8 rounded shadow-[0_0_20px_rgba(220,38,38,0.5)] transition-all transform hover:scale-105">
                重新开始 / REBOOT
            </button>
        </div>
    </div>

    <script>
        // 游戏状态
        const state = {
            player: { hp: 1000, maxHp: 1000, cdHeavy: 0, cdHeal: 0 },
            ai: { hp: 1200, maxHp: 1200, cdHeavy: 0, cdHeal: 0 },
            turn: 1,
            gameOver: false
        };

        // DOM 元素
        const ui = {
            playerHpBar: document.getElementById('player-hp-bar'),
            playerHpText: document.getElementById('player-hp-text'),
            aiHpBar: document.getElementById('ai-hp-bar'),
            aiHpText: document.getElementById('ai-hp-text'),
            log: document.getElementById('battle-log'),
            aiStatus: document.getElementById('ai-status'),
            modal: document.getElementById('game-over-modal'),
            endTitle: document.getElementById('end-title'),
            endMessage: document.getElementById('end-message'),
            btnHeavy: document.getElementById('btn-heavy'),
            btnHeal: document.getElementById('btn-heal'),
            cdHeavy: document.getElementById('cd-heavy'),
            cdHeal: document.getElementById('cd-heal'),
            container: document.getElementById('game-container')
        };

        // 初始化
        function init() {
            updateUI();
            log("系统就绪。等待玩家指令...", "system");
        }

        // 玩家行动
        function playerAction(type) {
            if (state.gameOver) return;

            let damage = 0;
            let heal = 0;
            let msg = "";
            let color = "text-blue-400";

            // 处理冷却
            if (type === 'heavy') {
                if (state.player.cdHeavy > 0) return;
                damage = randomInt(120, 180);
                msg = `玩家使用蓄力重击，造成 ${damage} 点巨额伤害！`;
                state.player.cdHeavy = 5;
                createParticles(window.innerWidth * 0.75, window.innerHeight * 0.4, 'red');
                shakeScreen();
            } else if (type === 'light') {
                damage = randomInt(50, 80);
                msg = `玩家使用快速斩击，造成 ${damage} 点伤害。`;
                createParticles(window.innerWidth * 0.75, window.innerHeight * 0.4, 'orange');
            } else if (type === 'heal') {
                if (state.player.cdHeal > 0) return;
                heal = randomInt(100, 150);
                msg = `玩家启动纳米修复，恢复了 ${heal} 点生命值。`;
                color = "text-green-400";
                state.player.cdHeal = 3;
                createParticles(window.innerWidth * 0.25, window.innerHeight * 0.4, 'blue');
            }

            // 应用效果
            if (damage > 0) {
                state.ai.hp = Math.max(0, state.ai.hp - damage);
                showFloatingText(damage, 'text-red-500', 'ai');
            }
            if (heal > 0) {
                state.player.hp = Math.min(state.player.maxHp, state.player.hp + heal);
                showFloatingText(`+${heal}`, 'text-green-400', 'player');
            }

            log(msg, "player", color);
            updateUI();
            checkWinCondition();

            // 冷却回合递减
            reduceCooldowns('player');

            if (!state.gameOver) {
                // AI 回合
                disableButtons(true);
                ui.aiStatus.innerHTML = '<span class="text-red-500 font-bold animate-pulse">AI 正在计算...</span>';
                setTimeout(aiTurn, 1000);
            }
        }

        // AI 回合逻辑
        function aiTurn() {
            if (state.gameOver) return;

            let actionType = '';
            let damage = 0;
            let heal = 0;
            let msg = "";
            let color = "text-red-400";

            // 简单 AI 逻辑
            const hpPercent = state.ai.hp / state.ai.maxHp;
            
            if (hpPercent < 0.3 && state.ai.cdHeal === 0) {
                actionType = 'heal';
            } else if (Math.random() > 0.7 && state.ai.cdHeavy === 0) {
                actionType = 'heavy';
            } else {
                actionType = 'light';
            }

            if (actionType === 'heavy') {
                damage = randomInt(100, 160);
                msg = `地狱AI发动地狱火重击！玩家受到 ${damage} 点伤害。`;
                state.ai.cdHeavy = 5;
                createParticles(window.innerWidth * 0.25, window.innerHeight * 0.4, 'red');
                shakeScreen();
            } else if (actionType === 'light') {
                damage = randomInt(60, 90);
                msg = `地狱AI进行撕咬，造成 ${damage} 点伤害。`;
                createParticles(window.innerWidth * 0.25, window.innerHeight * 0.4, 'orange');
            } else if (actionType === 'heal') {
                heal = randomInt(80, 120);
                msg = `地狱AI汲取黑暗能量，恢复了 ${heal} 点生命。`;
                color = "text-purple-400";
                state.ai.cdHeal = 5;
                createParticles(window.innerWidth * 0.75, window.innerHeight * 0.4, 'purple');
            }

            // 应用效果
            if (damage > 0) {
                state.player.hp = Math.max(0, state.player.hp - damage);
                showFloatingText(damage, 'text-red-600', 'player');
            }
            if (heal > 0) {
                state.ai.hp = Math.min(state.ai.maxHp, state.ai.hp + heal);
                showFloatingText(`+${heal}`, 'text-purple-400', 'ai');
            }

            log(msg, "ai", color);
            
            // AI 冷却递减
            reduceCooldowns('ai');
            
            updateUI();
            disableButtons(false);
            ui.aiStatus.innerHTML = '<span class="text-red-400 font-mono text-sm animate-pulse">等待指令输入...</span>';
            
            checkWinCondition();
            state.turn++;
        }

        // 辅助功能
        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function reduceCooldowns(who) {
            if (who === 'player') {
                if (state.player.cdHeavy > 0) state.player.cdHeavy--;
                if (state.player.cdHeal > 0) state.player.cdHeal--;
            } else {
                if (state.ai.cdHeavy > 0) state.ai.cdHeavy--;
                if (state.ai.cdHeal > 0) state.ai.cdHeal--;
            }
        }

        function updateUI() {
            // 更新血条
            const pPct = (state.player.hp / state.player.maxHp) * 100;
            const aPct = (state.ai.hp / state.ai.maxHp) * 100;
            
            ui.playerHpBar.style.width = `${pPct}%`;
            ui.playerHpText.innerText = `${state.player.hp} / ${state.player.maxHp}`;
            
            ui.aiHpBar.style.width = `${aPct}%`;
            ui.aiHpText.innerText = `${state.ai.hp} / ${state.ai.maxHp}`;

            // 更新按钮状态
            updateBtnState(ui.btnHeavy, ui.cdHeavy, state.player.cdHeavy);
            updateBtnState(ui.btnHeal, ui.cdHeal, state.player.cdHeal);
        }

        function updateBtnState(btn, cdOverlay, cdValue) {
            if (cdValue > 0) {
                btn.disabled = true;
                cdOverlay.classList.remove('hidden');
                cdOverlay.querySelector('span').innerText = cdValue;
            } else {
                btn.disabled = false;
                cdOverlay.classList.add('hidden');
            }
        }

        function disableButtons(disabled) {
            const buttons = document.querySelectorAll('.btn-attack');
            buttons.forEach(btn => {
                if (!btn.disabled) { // 保留冷却导致的禁用
                   btn.style.pointerEvents = disabled ? 'none' : 'auto';
                   btn.style.opacity = disabled ? '0.5' : '1';
                }
            });
        }

        function log(msg, type, colorClass = "") {
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString('zh-CN', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
            
            let prefix = "";
            if (type === 'player') prefix = "<span class='text-blue-500'>[玩家]</span>";
            if (type === 'ai') prefix = "<span class='text-red-500'>[地狱AI]</span>";
            if (type === 'system') prefix = "<span class='text-gray-500'>[系统]</span>";

            div.innerHTML = `<span class="text-gray-600 text-xs">[${time}]</span> ${prefix} <span class="${colorClass}">${msg}</span>`;
            ui.log.appendChild(div);
            ui.log.scrollTop = ui.log.scrollHeight;
        }

        function showFloatingText(text, colorClass, target) {
            const el = document.createElement('div');
            el.className = `floating-damage ${colorClass}`;
            el.innerText = text;
            
            // 随机位置偏移
            const randomX = randomInt(-50, 50);
            
            if (target === 'player') {
                el.style.left = `25%`;
                el.style.top = `40%`;
            } else {
                el.style.left = `75%`;
                el.style.top = `40%`;
            }
            
            el.style.transform = `translateX(${randomX}px)`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function shakeScreen() {
            ui.container.classList.add('shake-screen');
            setTimeout(() => ui.container.classList.remove('shake-screen'), 500);
        }

        function checkWinCondition() {
            if (state.player.hp <= 0) {
                endGame(false);
            } else if (state.ai.hp <= 0) {
                endGame(true);
            }
        }

        function endGame(playerWon) {
            state.gameOver = true;
            ui.modal.classList.remove('hidden');
            if (playerWon) {
                ui.endTitle.innerText = "VICTORY";
                ui.endTitle.className = "font-display text-5xl mb-4 text-blue-500 drop-shadow-[0_0_10px_rgba(59,130,246,0.8)]";
                ui.endMessage.innerText = "你击败了地狱AI，获得了短暂的安宁。";
            } else {
                ui.endTitle.innerText = "DEFEAT";
                ui.endTitle.className = "font-display text-5xl mb-4 text-red-600 drop-shadow-[0_0_10px_rgba(220,38,38,0.8)]";
                ui.endMessage.innerText = "你的灵魂已被地狱吞噬。";
            }
        }

        function resetGame() {
            state.player.hp = 1000;
            state.ai.hp = 1200;
            state.player.cdHeavy = 0;
            state.player.cdHeal = 0;
            state.ai.cdHeavy = 0;
            state.ai.cdHeal = 0;
            state.turn = 1;
            state.gameOver = false;
            
            ui.modal.classList.add('hidden');
            ui.log.innerHTML = '';
            log("系统重置完成...", "system");
            log("新的战斗开始！", "system");
            updateUI();
            disableButtons(false);
        }

        // 粒子特效系统
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.life = 100;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 2;
                this.size *= 0.95;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / 100;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createParticles(x, y, colorType) {
            let color = '#fff';
            if (colorType === 'red') color = '#ef4444';
            if (colorType === 'blue') color = '#3b82f6';
            if (colorType === 'orange') color = '#f97316';
            if (colorType === 'purple') color = '#a855f7';

            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // 启动
        init();

    </script>
</body>
</html>
